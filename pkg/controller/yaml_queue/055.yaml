apiVersion: batch/v1
kind: Job
metadata:
  name: "055"
  annotations:
    model_name: "densenet121_bs64_448x448"
    data_size: "20"
    epoch: "3883"
spec:
  backoffLimit: 4
  template:
    spec:
      containers:
      - args:
        - --model-name
        - densenet121_bs64_448x448
        - --model-path
        - /data/cyq/hase/model_zoo/models
        - --epoch
        - "3883"
        command:
        - python
        - run_onnx_model.py
        image: bencyq/nnmeter:202603311054
        name: onnxruntime-container
        workingDir: /data/cyq/hase/model_zoo
        volumeMounts:
        - mountPath: /data/cyq
          name: data-cyq
          readOnly: true
      restartPolicy: Never
      volumes:
      - name: data-cyq
        hostPath:
          path: /data/cyq
          type: Directory
